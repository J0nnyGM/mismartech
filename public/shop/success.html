    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }

</head>

<body class="bg-slate-50 font-sans text-brand-black antialiased">

    <div id="header-placeholder"></div>

    <div id="loading-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-50 z-50">
        <div class="w-16 h-16 border-4 border-gray-200 border-t-brand-orange rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-black uppercase tracking-tight">Verificando Estado...</h2>
        <p id="loading-text" class="text-xs text-gray-400 font-bold mt-2 tracking-widest">Consultando transacción</p>
    </div>

    <main id="main-content" class="container mx-auto px-6 py-12 hidden">
        
        <div class="flex items-center justify-center mb-12 gap-6">
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">01 Carrito</span>
            <div class="w-8 h-px bg-gray-300"></div>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">02 Envío</span>
            <div class="w-8 h-px bg-gray-300"></div>
            <span class="text-[11px] font-black text-brand-black uppercase tracking-widest underline decoration-brand-orange decoration-2 underline-offset-[10px]">03 Confirmación</span>
        </div>

        <div class="max-w-4xl mx-auto text-center fade-in-up">
            
            <h1 id="page-title" class="text-5xl font-black tracking-tighter uppercase mb-4"></h1>
            
            <p id="page-subtitle" class="text-gray-400 font-bold uppercase tracking-[0.2em] text-[10px] mb-12"></p>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 text-left">
                
                <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-xl flex flex-col h-full relative overflow-hidden">
                    <h3 class="font-black text-[10px] uppercase tracking-[0.3em] text-gray-400 mb-6 border-b border-gray-50 pb-4">Resumen de la Orden</h3>
                    
                    <div id="success-items-container" class="space-y-4 mb-4 overflow-y-auto max-h-[280px] custom-scroll pr-2 flex-grow">
                        </div>

                    <div class="border-t border-gray-100 pt-5 space-y-4 bg-gray-50/50 -mx-8 px-8 pb-5 mt-auto rounded-b-[2.5rem]">
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-black text-gray-500 uppercase tracking-widest text-[10px]">Subtotal</span>
                            <span id="order-subtotal" class="font-black text-brand-black text-base">$0</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-black text-gray-500 uppercase tracking-widest text-[10px]">Envío</span>
                            <span id="order-shipping" class="font-black text-brand-black text-base">$0</span>
                        </div>
                        <div class="border-t border-gray-200/80 my-3"></div>
                        <div class="flex justify-between items-center">
                            <span class="font-black text-xs uppercase text-gray-400 tracking-[0.2em]">Total</span>
                            <span id="order-total" class="text-4xl font-black tracking-tighter text-brand-orange">$0</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div id="info-card" class="bg-brand-black rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden transition-colors duration-500">
                        <h3 class="font-black text-[10px] uppercase tracking-[0.3em] text-white/50 mb-8">Información del Cliente</h3>
                        
                        <div class="space-y-5 relative z-10">
                            <div>
                                <p class="text-[9px] font-black text-white/50 uppercase tracking-wider">Referencia</p>
                                <p id="order-id" class="text-sm font-bold text-white font-mono uppercase tracking-widest mt-1">...</p>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-white/50 uppercase tracking-wider">Destinatario</p>
                                <p id="order-customer" class="text-sm font-bold text-white mt-1"></p>
                                <p id="order-doc" class="text-[10px] text-white/60 mt-0.5 font-mono"></p> 
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-white/50 uppercase tracking-wider">Dirección</p>
                                <p id="order-address" class="text-sm font-bold text-white leading-snug mt-1"></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-white/50 uppercase tracking-wider">Estado</p>
                                <div class="mt-2 inline-block">
                                    <span id="order-status-badge" class="px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest bg-white/20 text-white backdrop-blur-sm border border-white/10">
                                        ---
                                    </span>
                                </div>
                                <p id="payment-method-text" class="text-[10px] text-white/60 mt-2 font-bold uppercase"></p>
                            </div>
                            <div id="billing-info-container" class="hidden pt-6 mt-6 border-t border-white/10">
                                <h4 class="font-black text-[10px] uppercase tracking-[0.3em] text-white/50 mb-3">Facturación</h4>
                                <div class="space-y-1 text-xs text-white/80">
                                    <p class="flex justify-between"><span class="font-bold uppercase text-[9px]">Nombre:</span> <span id="bill-name" class="text-right"></span></p>
                                    <p class="flex justify-between"><span class="font-bold uppercase text-[9px]">NIT/CC:</span> <span id="bill-tax" class="text-right font-mono"></span></p>
                                </div>
                            </div>
                        </div>
                        
                        <i id="bg-icon" class="fa-solid fa-box-open absolute -right-8 -bottom-8 text-[12rem] opacity-5 rotate-12 transition-transform duration-700"></i>
                    </div>
                    
                    <!-- Contenedor Dinámico de Instrucciones de Pago -->
                    <div id="payment-instructions-card" class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-xl relative overflow-hidden hidden transition-all duration-500">
                    </div>

                    <div id="action-buttons" class="grid grid-cols-1 gap-4"></div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadGlobalHeader, loadGlobalFooter } from '../js/global-components.js';        
        import { db, doc, onSnapshot, auth, onAuthStateChanged, getDoc } from '../js/firebase-init.js';
        import { updateCartCount } from '../js/shop/cart.js';   

        loadGlobalHeader();
        loadGlobalFooter();

        // Función global para copiar datos bancarios al portapapeles
        window.copyToClipboard = function(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> ¡Copiado!';
                btnElement.classList.remove('bg-brand-black', 'text-white');
                btnElement.classList.add('bg-green-600', 'text-white');

                setTimeout(() => {
                    btnElement.innerHTML = originalContent;
                    btnElement.classList.add('bg-brand-black', 'text-white');
                    btnElement.classList.remove('bg-green-600', 'text-white');
                }, 2000);
            }).catch(err => {
                console.error('Error al copiar: ', err);
            });
        };

        const loadingScreen = document.getElementById('loading-screen');
        const mainContent = document.getElementById('main-content');
        const loadingText = document.getElementById('loading-text');

        // Escuchar el estado de autenticación ANTES de consultar la orden
        onAuthStateChanged(auth, (user) => {
            if (user) {
                init(user.uid);
            } else {
                // Si no está logueado, lo mandamos al login guardando la url para que regrese
                sessionStorage.setItem('redirect_after_login', window.location.pathname + window.location.search);
                window.location.href = '/auth/login.html';
            }
        });

        async function init(currentUserId) {
            try {
                const params = new URLSearchParams(window.location.search);
                const orderId = params.get('external_reference') || params.get('order');
                const mpStatus = params.get('collection_status'); 

                if (!orderId) throw new Error("No se encontró la referencia del pedido.");

                console.log("📡 Consultando orden:", orderId);

                // Obtener el rol del usuario actual para validación de privilegios
                const staffRoles = ['admin', 'contabilidad', 'ventas', 'logistica'];
                let userRole = sessionStorage.getItem(`role_${currentUserId}`);
                if (!userRole) {
                    try {
                        const userDoc = await getDoc(doc(db, "users", currentUserId));
                        userRole = userDoc.exists() ? userDoc.data().role || 'customer' : 'customer';
                        sessionStorage.setItem(`role_${currentUserId}`, userRole);
                    } catch (e) {
                        console.error("Error obteniendo rol del usuario:", e);
                        userRole = 'customer';
                    }
                }
                const isStaff = staffRoles.includes(userRole);
                
                const unsubscribe = onSnapshot(doc(db, "orders", orderId), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // 🔒 VALIDACIÓN DE SEGURIDAD CRÍTICA
                        // Verificar que el usuario viendo la página sea el dueño de la orden o un administrador/staff
                        if (data.userId !== currentUserId && !isStaff) {
                            alert("No tienes permiso para ver esta orden.");
                            window.location.href = '/profile.html';
                            return;
                        }

                        const status = data.status;
                        loadingText.textContent = `Estado: ${status}...`;

                        if (status === 'PAGADO' || status === 'PENDIENTE' || (status === 'PENDIENTE_PAGO' && mpStatus === 'approved') || (status === 'PENDIENTE_PAGO' && (data.paymentMethod === 'COD' || data.paymentMethod === 'MANUAL'))) {
                            localStorage.removeItem('smartech_cart'); 
                            localStorage.removeItem('pending_order_data');
                            updateCartCount();
                            renderUI(data, orderId, 'SUCCESS');
                            unsubscribe();
                        }
                        else if (status === 'PENDIENTE_PAGO') {
                            renderUI(data, orderId, 'PENDING');
                        }
                        else if (status === 'RECHAZADO' || status === 'CANCELADO' || mpStatus === 'rejected') {
                            renderUI(data, orderId, 'FAILURE');
                            unsubscribe();
                        }
                        
                    } else {
                        loadingText.textContent = "Sincronizando orden...";
                    }
                }, (error) => {
                    console.error("Error lectura:", error);
                    if (mpStatus === 'approved') renderFallback(orderId, 'SUCCESS');
                    else if (mpStatus === 'rejected') renderFallback(orderId, 'FAILURE');
                    else renderFallback(orderId, 'PENDING');
                });

            } catch (error) {
                console.error(error);
                alert("No pudimos encontrar tu orden. Regresando al inicio.");
                window.location.href = '/index.html';
            }
        }

        function renderUI(order, id, type) {
            loadingScreen.classList.add('hidden');
            mainContent.classList.remove('hidden');

            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            const infoCard = document.getElementById('info-card');
            const bgIcon = document.getElementById('bg-icon');
            const badge = document.getElementById('order-status-badge');
            const actions = document.getElementById('action-buttons');
            const paymentText = document.getElementById('payment-method-text');

            if (type === 'SUCCESS') {
                title.innerHTML = `¡Pedido <span class="text-brand-orange">Confirmado</span>!`;
                subtitle.textContent = "Gracias por confiar en MiSmartech";
                infoCard.className = "bg-brand-black rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden";
                
                if (order.paymentMethod === 'COD') {
                    bgIcon.className = "fa-solid fa-truck-ramp-box absolute -right-8 -bottom-8 text-[12rem] opacity-5 rotate-12 text-brand-orange";
                    badge.className = "px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest bg-yellow-500 text-brand-black shadow-lg shadow-yellow-500/20";
                    badge.textContent = "PENDIENTE POR PAGO AL MENSAJERO";
                } 
                else if (order.paymentMethod === 'MANUAL') {
                    bgIcon.className = "fa-solid fa-building-columns absolute -right-8 -bottom-8 text-[12rem] opacity-5 rotate-12 text-brand-orange";
                    badge.className = "px-3 py-1.5 rounded text-[9px] font-black uppercase tracking-wider bg-brand-orange text-brand-black shadow-lg shadow-brand-orange/20";
                    badge.textContent = "PENDIENTE DE PAGO - ENVÍA EL COMPROBANTE AL 319 627 6426";
                } 
                else {
                    bgIcon.className = "fa-solid fa-box-open absolute -right-8 -bottom-8 text-[12rem] opacity-5 rotate-12 text-brand-orange";
                    badge.className = "px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest bg-green-500 text-white shadow-lg shadow-green-500/30";
                    badge.textContent = "PAGO EXITOSO";
                }
                
                actions.innerHTML = `
                    <a href="/profile.html" class="w-full bg-brand-orange text-brand-black font-black py-5 rounded-2xl hover:bg-brand-black hover:text-white transition-all uppercase text-xs tracking-[0.2em] flex items-center justify-center gap-3 shadow-xl">
                        Ir a mis pedidos <i class="fa-solid fa-list-check"></i>
                    </a>
                    <a href="/index.html" class="w-full bg-white border border-gray-200 text-gray-400 font-black py-5 rounded-2xl hover:border-brand-orange hover:text-brand-black transition-all uppercase text-[10px] tracking-[0.2em] flex items-center justify-center gap-3">
                        Seguir Comprando
                    </a>
                `;
                triggerConfetti();
            } 
            else if (type === 'PENDING') {
                title.innerHTML = `¡Pago en <span class="text-yellow-500">Proceso</span>!`;
                subtitle.textContent = "Tu entidad financiera está validando la transacción.";
                subtitle.classList.replace('text-gray-400', 'text-yellow-600');
                
                infoCard.className = "bg-yellow-500 rounded-[2.5rem] p-10 text-white shadow-2xl shadow-yellow-200 relative overflow-hidden";
                bgIcon.className = "fa-solid fa-hourglass-half absolute -right-8 -bottom-8 text-[12rem] opacity-10 rotate-0 text-white";
                
                badge.className = "px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest bg-white text-yellow-600 shadow-lg";
                badge.textContent = "VALIDANDO PAGO";

                actions.innerHTML = `
                    <button onclick="location.reload()" class="w-full bg-brand-black text-white font-black py-6 rounded-2xl hover:bg-gray-800 transition-all uppercase text-xs tracking-[0.2em] flex items-center justify-center gap-3 shadow-xl">
                        Consultar Nuevamente <i class="fa-solid fa-rotate"></i>
                    </button>
                    <a href="https://wa.me/573196276426" target="_blank" class="w-full bg-white border border-gray-200 text-gray-400 font-black py-5 rounded-2xl hover:text-green-500 hover:border-green-500 transition-all uppercase text-[10px] tracking-[0.2em] flex items-center justify-center gap-3">
                        Contactar Soporte <i class="fa-brands fa-whatsapp"></i>
                    </a>
                `;
            }
            else {
                title.innerHTML = `¡Pago <span class="text-red-500">Rechazado</span>!`;
                if (order.paymentMethod === 'ADDI') {
                    subtitle.textContent = "Tu solicitud de crédito ADDI no fue aprobada.";
                } else {
                    subtitle.textContent = "La transacción fue declinada por el banco o pasarela.";
                }
                subtitle.classList.replace('text-gray-400', 'text-red-400');
                
                infoCard.className = "bg-red-600 rounded-[2.5rem] p-10 text-white shadow-2xl shadow-red-200 relative overflow-hidden";
                bgIcon.className = "fa-solid fa-circle-xmark absolute -right-8 -bottom-8 text-[12rem] opacity-10 rotate-0 text-white";
                badge.className = "px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest bg-white text-red-600 shadow-lg";
                badge.textContent = "TRANSACCIÓN FALLIDA";

                actions.innerHTML = `
                    <a href="/shop/checkout.html" class="w-full bg-brand-black text-white font-black py-6 rounded-2xl hover:bg-gray-800 transition-all uppercase text-xs tracking-[0.2em] flex items-center justify-center gap-3 shadow-xl">
                        Intentar con otro medio <i class="fa-solid fa-rotate-right"></i>
                    </a>
                    <a href="/index.html" class="w-full bg-white border border-gray-200 text-gray-400 font-black py-5 rounded-2xl hover:text-red-500 hover:border-red-200 transition-all uppercase text-[10px] tracking-[0.2em] flex items-center justify-center gap-3">
                        Cancelar Orden
                    </a>
                `;
            }

            document.getElementById('order-id').textContent = id.slice(0, 8).toUpperCase();
            document.getElementById('order-customer').textContent = order.userName || order.buyerInfo?.name || "Cliente";
            const docNum = order.clientDoc || order.buyerInfo?.document;
            if(docNum) document.getElementById('order-doc').textContent = `ID: ${docNum}`;
            let paymentMethodName = order.paymentMethod || 'Pasarela';
            if (order.paymentMethod === 'COD') paymentMethodName = 'Pago Contra Entrega';
            else if (order.paymentMethod === 'MANUAL') paymentMethodName = 'Transferencia Manual';
            else if (order.paymentMethod === 'PSE') paymentMethodName = 'PSE';
            else if (order.paymentMethod === 'ONLINE') paymentMethodName = 'Tarjeta de Crédito / Débito';
            else if (order.paymentMethod === 'ADDI') paymentMethodName = 'Crédito ADDI';
            else if (order.paymentMethod === 'SISTECREDITO') paymentMethodName = 'Crédito Sistecrédito';

            paymentText.innerHTML = `<span class="text-white/50">Método de Pago:</span> <span class="font-black text-brand-orange bg-brand-orange/10 px-2 py-0.5 rounded border border-brand-orange/20">${paymentMethodName}</span>`;

            let addr = order.shippingData?.address || order.buyerInfo?.address || "Dirección no disponible";
            const city = order.shippingData?.city || order.buyerInfo?.city || "";
            if (city) addr += `, ${city}`;
            document.getElementById('order-address').textContent = addr;

            if (order.needsInvoice && order.billingData) {
                document.getElementById('billing-info-container').classList.remove('hidden');
                document.getElementById('bill-name').textContent = order.billingData.name || "N/A";
                document.getElementById('bill-tax').textContent = order.billingData.taxId || "N/A";
            }

            const subtotal = order.subtotal || 0;
            const shipping = order.shippingCost || 0;
            const total = order.total || 0;

            document.getElementById('order-subtotal').textContent = `$${subtotal.toLocaleString('es-CO')}`;
            const shippingEl = document.getElementById('order-shipping');
            if (shipping === 0) {
                shippingEl.textContent = "GRATIS";
                shippingEl.className = "font-black text-emerald-600 text-base uppercase tracking-wider animate-pulse";
            } else {
                shippingEl.textContent = `$${shipping.toLocaleString('es-CO')}`;
                shippingEl.className = "font-black text-brand-black text-base";
            }
            document.getElementById('order-total').textContent = `$${total.toLocaleString('es-CO')}`;

            // --- RENDERIZADO DE ITEMS CON PROMOCIÓN ---
            const itemsContainer = document.getElementById('success-items-container');
            if (order.items && order.items.length > 0) {
                itemsContainer.innerHTML = order.items.map(item => {
                    const price = item.unit_price || item.price || 0;
                    const qty = item.quantity || 1;
                    const originalPrice = item.originalPrice || 0;
                    
                    // Lógica de Descuento
                    const hasDiscount = originalPrice > price;
                    const finalPriceTotal = price * qty;
                    const originalPriceTotal = originalPrice * qty;

                    return `
                        <div class="flex items-center gap-4 group p-2 hover:bg-gray-50 rounded-xl transition-colors">
                            <div class="w-12 h-12 bg-white rounded-lg p-1 border border-gray-100 shrink-0 shadow-sm">
                                <img src="${item.picture_url || item.mainImage || item.image || 'https://placehold.co/50'}" class="w-full h-full object-contain">
                            </div>
                            <div class="flex-grow min-w-0">
                                <h4 class="font-bold text-[10px] uppercase text-brand-black truncate">${item.title || item.name}</h4>
                                <div class="flex flex-wrap gap-1 mt-1">
                                    ${item.color ? `<span class="text-[7px] font-bold uppercase bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded border border-gray-200">${item.color}</span>` : ''}
                                    ${item.capacity ? `<span class="text-[7px] font-bold uppercase bg-brand-orange/10 text-brand-orange px-1.5 py-0.5 rounded border border-brand-orange/20">${item.capacity}</span>` : ''}
                                    ${hasDiscount ? `<span class="text-[7px] font-bold uppercase bg-red-100 text-red-600 px-1.5 py-0.5 rounded border border-red-200"><i class="fa-solid fa-tag mr-1"></i>OFERTA</span>` : ''}
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <p class="text-[9px] font-bold text-gray-400 uppercase">x${qty}</p>
                                ${hasDiscount 
                                    ? `<p class="text-[8px] line-through text-gray-400">$${originalPriceTotal.toLocaleString('es-CO')}</p>` 
                                    : ''}
                                <p class="text-[10px] font-black ${hasDiscount ? 'text-red-500' : 'text-brand-black'}">$${finalPriceTotal.toLocaleString('es-CO')}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                itemsContainer.innerHTML = `<p class="text-xs text-gray-400 text-center italic py-4">Detalles no disponibles</p>`;
            }

            // --- INSTRUCCIONES DE PAGO DINÁMICAS ---
            const instructionsCard = document.getElementById('payment-instructions-card');
            const method = order.paymentMethod || '';

            if (type !== 'FAILURE' && method) {
                instructionsCard.classList.remove('hidden');
                let html = '';

                if (method === 'MANUAL') {
                    const waPhone = "573196276426";
                    const shortId = id.slice(0, 8).toUpperCase();
                    const formattedTotal = total.toLocaleString('es-CO');
                    const buyerName = order.userName || order.buyerInfo?.name || "Cliente";
                    const messageText = `¡Hola! Acabo de realizar el pago de mi pedido #${shortId} por valor de $${formattedTotal} a nombre de ${buyerName} con transferencia manual. Adjunto mi comprobante de pago.`;
                    const waUrl = `https://wa.me/${waPhone}?text=${encodeURIComponent(messageText)}`;

                    html = `
                        <h3 class="font-black text-[11px] uppercase tracking-[0.25em] text-brand-orange mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-building-columns"></i> Instrucciones de Transferencia
                        </h3>
                        <p class="text-xs text-gray-600 leading-relaxed mb-5 font-semibold">
                            Por favor realiza la transferencia a cualquiera de nuestras cuentas oficiales y envía tu comprobante haciendo clic en el botón de WhatsApp abajo:
                        </p>
                        
                        <div class="space-y-4 mb-6">
                            <!-- Bancolombia Card -->
