    <style>
        .no-scrollbar::-webkit-scrollbar {

        .no-scrollbar {

        .checkout-input-group {
            background-color: #ffffff;
            border: 2px solid #f3f4f6;
            border-radius: 1.25rem;
            padding: 1rem 1.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .checkout-input-group:focus-within {
            border-color: #F05A28;
            box-shadow: 0 10px 20px -10px rgba(240, 90, 40, 0.15);
        }

        .checkout-input-group label {
            display: block;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #9ca3af;
            margin-bottom: 0.25rem;
        }

        .checkout-input-group input,
        .checkout-input-group select {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-weight: 700;
            font-size: 0.875rem;
            color: #111827;
        }

        /* Checkbox personalizado */
        .checkbox-wrapper input:checked+div {
            background-color: #F05A28;
            border-color: #F05A28;
        }

        .payment-disabled {
            opacity: 0.45;
            pointer-events: none;
            filter: grayscale(100%);
        }

        /* Animación Barra de Envío Gratis */
        .progress-striped {
            background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);
            background-size: 1rem 1rem;
            animation: progress-move 1s linear infinite;
        }
        @keyframes progress-move {
            0% { background-position: 0 0; }
            100% { background-position: 1rem 0; }
        }

        /* Animaciones del cintillo dinámico marquee */
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; width: max-content; animation: marquee 45s linear infinite; }
        .marquee-container:hover .animate-marquee { animation-play-state: paused; }

        /* Animación pulso para mensaje de despacho */
        .pulse-text {
            animation: pulse-orange 2s infinite;
        }

        @keyframes pulse-orange {
            0% {
                text-shadow: 0 0 0 rgba(240, 90, 40, 0.3);
            }
            70% {
                text-shadow: 0 0 8px rgba(240, 90, 40, 0);
            }
            100% {
                text-shadow: 0 0 0 rgba(240, 90, 40, 0);
            }
        }

        .radio-circle {
            transition: all 0.3s ease;
        }
        
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
    </style>

                                <div class="flex-grow min-w-0"><h4 class="font-black text-sm uppercase tracking-wide text-brand-black mb-1">Crédito Sistecrédito</h4><p class="text-[10px] text-gray-500 font-bold leading-tight">Usa tu cupo aprobado de Sistecrédito para diferir tu compra de forma instantánea.</p></div>
                                <div class="radio-circle w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center transition-all duration-300 shrink-0 bg-white"><i class="radio-icon fa-solid fa-check text-white text-[10px] opacity-0 transform scale-50 transition-all duration-300"></i></div>
                            </div>
                        </label>
                    </div>
                </form>
            </div>

            <!-- Columna Resumen Derecha (35%) -->
            <div class="w-full lg:w-[35%] relative">
                <div class="bg-brand-black bg-gradient-to-br from-[#1c1c1f] via-brand-black to-black rounded-[2.5rem] p-8 md:p-9 shadow-[0_20px_50px_rgba(0,0,0,0.25)] border border-white/5 sticky top-24 text-white">
                    <h3 class="font-black text-xs uppercase tracking-[0.2em] text-gray-400 mb-8 border-b border-white/5 pb-5 flex justify-between items-center">
                        Resumen del Pedido
                        <span id="order-qty-display" class="bg-white/10 text-brand-orange border border-brand-orange/20 px-3 py-1 rounded-xl text-[9px] font-black tracking-normal shadow-md">0 Ítems</span>
                    </h3>

                    <div id="checkout-items" class="max-h-60 overflow-y-auto pr-1 custom-scroll mb-8 space-y-4"></div>

                    <!-- NUEVO: Sección de Cupones Promocionales -->
                    <div class="border-t border-dashed border-white/10 pt-6 mb-6">
                        <button type="button" onclick="const container = document.getElementById('promo-input-container'); container.classList.toggle('hidden'); this.querySelector('i').classList.toggle('rotate-180');" class="text-[9px] font-black text-gray-400 uppercase tracking-widest flex items-center gap-1.5 hover:text-brand-orange transition focus:outline-none select-none">
                            ¿Tienes un cupón de descuento? <i class="fa-solid fa-chevron-down text-[8px] transition-transform duration-200"></i>
                        </button>
                        <div id="promo-input-container" class="hidden mt-3 space-y-3 animate-in fade-in slide-in-from-top-1">
                            <div class="flex gap-2">
                                <input type="text" id="promo-code-input" placeholder="Ingresa código..." class="bg-white/5 border border-white/15 px-4 py-2.5 rounded-xl text-xs font-bold text-white outline-none focus:border-brand-orange w-full uppercase">
                                <button type="button" id="btn-apply-promo" class="bg-brand-orange text-white px-5 rounded-xl text-xs font-black uppercase tracking-wider hover:bg-white hover:text-brand-orange transition shrink-0">Aplicar</button>
                            </div>
                        </div>
                        <div id="applied-promos-container" class="flex flex-wrap gap-2 mt-3"></div>
                    </div>

                    <div class="space-y-4 border-t border-dashed border-white/10 pt-6">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wide">Subtotal</span>
                            <span id="check-subtotal" class="text-base font-black text-white tracking-tight">$0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wide">Costo de Envío</span>
                            <span id="check-shipping" class="text-brand-orange bg-brand-orange/10 border border-brand-orange/20 px-2.5 py-1 rounded-xl text-[10px] font-black tracking-wider">--</span>
                        </div>
                        <div id="discount-row" class="flex justify-between items-center hidden">
                            <span class="text-xs font-bold text-red-400 uppercase tracking-wide">Descuento</span>
                            <span id="check-discount" class="text-xs font-black text-red-500">- $0</span>
                        </div>
                        <div id="checkout-dispatch-msg" class="text-right mt-1.5 hidden animate-in fade-in slide-in-from-top-1"></div>
                        <div id="free-shipping-msg" class="hidden text-center bg-emerald-500/10 text-emerald-400 text-[10px] font-black uppercase py-2.5 rounded-xl border border-emerald-500/20 flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-gift text-sm"></i> ¡Envío Gratis Aplicado!</div>
                    </div>

                    <div class="flex flex-col items-end mb-8 border-t-2 border-dashed border-white/10 pt-6 mt-8">
                        <span class="font-black text-[10px] uppercase tracking-[0.25em] text-gray-500 mb-1.5">Total Neto a Pagar</span>
                        <span id="check-total" class="text-4xl md:text-5xl font-black tracking-tighter text-white leading-none">$0</span>
                        <p class="text-[9px] font-bold text-gray-500 mt-2 uppercase tracking-widest">Garantía e impuestos incluidos</p>
                    </div>

                    <button id="btn-complete-order" disabled class="w-full mt-10 bg-white/5 text-white/20 border border-white/5 font-black py-4.5 rounded-2xl transition-all duration-300 uppercase text-xs tracking-[0.25em] flex items-center justify-center gap-3 cursor-not-allowed group hover:shadow-lg">
                        Confirmar Pedido
                        <div class="w-5 h-5 rounded-full bg-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-brand-black transition-colors"><i class="fa-solid fa-check text-[10px]"></i></div>
                    </button>

                    <div class="mt-8 pt-6 border-t border-white/5 flex flex-col items-center text-center">
                        <p class="text-[9px] text-gray-500 font-black uppercase tracking-[0.2em] flex items-center gap-2 mb-3">
                            <i class="fa-solid fa-shield-halved text-emerald-500 text-xs"></i> Conexión Cifrada & Compra Segura
                        </p>
                        <div class="flex gap-4 opacity-30 grayscale hover:grayscale-0 hover:opacity-70 transition duration-500 text-xl text-white">
                            <i class="fa-brands fa-cc-visa" title="Visa"></i>
                            <i class="fa-brands fa-cc-mastercard" title="Mastercard"></i>
                            <i class="fa-solid fa-money-bill-wave" title="Efectivo"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalContent = btnElement.innerHTML;

                // Cambiar estilo y texto temporalmente
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> Copiado!';
                btnElement.classList.remove('bg-brand-black', 'text-white');
                btnElement.classList.add('bg-green-500', 'text-white');

                setTimeout(() => {
                    btnElement.innerHTML = originalContent;
                    btnElement.classList.add('bg-brand-black', 'text-white');
                    btnElement.classList.remove('bg-green-500', 'text-white');
                }, 2000);
            }).catch(err => {
                console.error('Error al copiar: ', err);
            });
        }
    </script>

    <script type="module">
        import { loadGlobalHeader, loadGlobalFooter } from '../js/global-components.js';
        loadGlobalHeader();
        loadGlobalFooter();
    </script>
    <script type="module" src="../js/shop/checkout.js"></script>
</body>
