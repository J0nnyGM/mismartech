<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F05A28">
    <link rel="apple-touch-icon" href="/img/icons/icon-192x192.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías de Tecnología en Medellín - Celulares y Gadgets | MI Smartech</title>
    <meta name="description" content="Explora nuestras categorías de dispositivos y accesorios de tecnología en Medellín en MI Smartech. Celulares, audio, carga rápida y smartwatches con garantía directa.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="canonical" href="https://mismartech.com/categories.html" />
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        /* Animación suave de entrada */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Resplandor ambiental de marca en el fondo del sitio */
        .bg-glow {
            background: radial-gradient(circle at 50% 50%, rgba(240, 90, 40, 0.04) 0%, transparent 75%);
        }

        /* Hace que el header se desplace con la página en vez de quedarse fijo (sticky) */
        header {
            position: relative !important;
            top: auto !important;
            box-shadow: none !important;
        }
        
        /* Desplaza también el buscador/banner móvil en caso de que esté sticky */
        .lg\:hidden.sticky {
            position: relative !important;
            top: auto !important;
            box-shadow: none !important;
        }

        /* Estilo para la tarjeta activa seleccionada */
        .active-card {
            border-color: rgba(240, 90, 40, 0.5) !important;
            box-shadow: 0 20px 50px rgba(240, 90, 40, 0.25) !important;
            transform: translateY(-10px) !important;
        }
        
        /* Activa el gradiente naranja de hover en la tarjeta activa */
        .active-card .group-hover\:opacity-100,
        .active-card div[class*="from-brand-orange"] {
            opacity: 1 !important;
        }

        .active-card .group-hover\:opacity-0,
        .active-card div[class*="from-black"] {
            opacity: 0 !important;
        }

        .active-card h3 {
            color: #ffffff !important;
        }

        .active-card div[class*="bg-brand-orange"] {
            width: 2.5rem !important;
        }
    </style>
    <link rel="modulepreload" href="js/firebase-init.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js">
</head>

<body class="bg-slate-50/60 font-sans text-brand-black antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <!-- Decoración de iluminación ambiental de fondo -->
    <div class="absolute top-20 left-1/4 w-[600px] h-[600px] bg-glow pointer-events-none -z-10"></div>

    <div id="header-placeholder"></div>

    <!-- Contenedor adaptado a todo el ancho (fluid full width px-4 md:px-12 sin max-w-7xl) -->
    <main class="flex-grow w-full px-4 md:px-12 py-16 relative z-10">
        
        <!-- VISTA DE CATEGORÍAS PRINCIPALES -->
        <div id="main-view" class="fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6 border-l-[6px] border-brand-orange pl-6 md:pl-8 rounded-l">
                <div>
                    <h1 class="text-4xl md:text-5xl font-black text-brand-black tracking-tighter uppercase leading-none">Categorías de <span class="text-brand-orange">Tecnología</span></h1>
                    <p class="text-gray-400 font-black text-[10px] mt-2.5 uppercase tracking-[0.2em] leading-none">Selecciona una categoría principal</p>
                </div>
                <a href="/shop/catalog.html" class="group flex items-center gap-3 bg-brand-black text-white px-7 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-brand-orange hover:text-brand-black transition duration-300 shadow-md hover:shadow-[0_10px_25px_-5px_rgba(240,90,40,0.35)] hover:-translate-y-0.5 shrink-0">
                    <span>Ver Todo el Catálogo</span>
                    <i class="fa-solid fa-store group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>

            <!-- Grilla Principal que contendrá dinámicamente las tarjetas y el panel expansible inline -->
            <div id="categories-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 items-start">
                <div class="col-span-full flex justify-center py-24">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-orange"></i>
                </div>
            </div>
        </div>

        <!-- PANEL DE SUBCATEGORÍAS INLINE (Se desplaza e inyecta dinámicamente con JS dentro del grid) -->
        <div id="subcategories-panel" class="col-span-full hidden bg-white/90 backdrop-blur-md rounded-[2.5rem] border border-slate-200/80 p-6 md:p-10 my-4 shadow-[0_15px_40px_rgba(0,0,0,0.03)] hover:shadow-[0_20px_50px_rgba(240,90,40,0.05)] hover:border-brand-orange/20 transition-all duration-500 fade-in w-full">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 border-l-4 border-brand-orange pl-4">
                <div>
                    <h4 class="text-xl md:text-2xl font-black text-brand-black uppercase tracking-tight leading-none">Subcategorías de <span class="text-brand-orange" id="current-cat-name">...</span></h4>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-2">Selecciona una subcategoría específica</p>
                </div>

                <div class="flex items-center gap-3 shrink-0 self-end sm:self-auto">
                    <a id="btn-view-all-sub" href="#" class="group flex items-center gap-2 bg-brand-black text-white px-5 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-brand-orange hover:text-brand-black transition duration-300 shadow-sm hover:shadow-[0_10px_20px_rgba(240,90,40,0.15)]">
                        <span>Ver Todo</span>
                        <i class="fa-solid fa-arrow-right text-[8px] group-hover:translate-x-0.5 transition-transform"></i>
                    </a>
                    
                    <button onclick="window.closeSubcategories()" class="group w-9 h-9 rounded-xl bg-gray-50 border border-gray-100 text-gray-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition duration-300 shadow-sm active:scale-90" title="Cerrar subcategorías">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>
            </div>

            <div id="subcategories-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Se llena dinámicamente con JS -->
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadGlobalHeader, loadGlobalFooter } from './js/global-components.js';
        loadGlobalHeader();
        loadGlobalFooter();
    </script>
    <script type="module" src="js/shop/categories-public.js"></script>

</body>
</html>
