<!DOCTYPE html>
<html lang="es">
<head>
    <!-- --- PRE-OCULTACIÓN INSTANTÁNEA PARA EVITAR FLASH DE CONTENIDO EN MANTENIMIENTO --- -->
    <script>
        const _preloadPath = window.location.pathname;
        if (localStorage.getItem('mismartech_maintenance_active') === 'true' && !_preloadPath.includes('/admin/') && !_preloadPath.includes('/auth/') && !_preloadPath.includes('mantenimiento.html')) {
            const style = document.createElement('style');
            style.id = 'maintenance-preload-hide';
            style.innerHTML = 'html { display: none !important; }';
            document.documentElement.appendChild(style);
        }
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F8FAFC">
    <link rel="apple-touch-icon" href="/img/icons/icon-192x192.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | MiSmartech</title>
    <link rel="canonical" href="https://mismartech.com/404.html" />
    
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    
    <style>
        body {
            background-color: #F8FAFC !important;
            color: #0F172A !important;
        }
        /* Ambient Glowing Lights */
        .ambient-glow-404-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(240, 90, 40, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-glow-404 8s infinite alternate ease-in-out;
            pointer-events: none;
            filter: blur(60px);
            z-index: 1;
        }
        .ambient-glow-404-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            top: 20%;
            right: 10%;
            animation: float-glow-404-2 15s infinite alternate ease-in-out;
            pointer-events: none;
            filter: blur(50px);
            z-index: 1;
        }
        @keyframes pulse-glow-404 {
            0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }
        @keyframes float-glow-404-2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-60px, 60px) scale(1.1); }
        }

        /* Ambient Stars Pattern overlay */
        .stars-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        /* Zero-Gravity Floating Logo Capsule */
        .float-logo {
            animation: float-orbit 6s ease-in-out infinite;
        }
        @keyframes float-orbit {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 25s linear infinite;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* 3D Glitch Effect for Light Theme */
        .glitch-text {
            position: relative;
            color: #0F172A;
        }
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F8FAFC;
        }
        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #F05A28;
            clip-path: inset(40% 0 61% 0);
            animation: glitch-anim 4s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #EF4444, 0 2px #F05A28;
            clip-path: inset(25% 0 58% 0);
            animation: glitch-anim-2 4s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip-path: inset(40% 0 61% 0); transform: skew(0.3deg); }
            20% { clip-path: inset(92% 0 1% 0); transform: skew(-0.5deg); }
            40% { clip-path: inset(15% 0 80% 0); transform: skew(0.5deg); }
            60% { clip-path: inset(80% 0 5% 0); transform: skew(-0.2deg); }
            80% { clip-path: inset(5% 0 92% 0); transform: skew(0.1deg); }
            100% { clip-path: inset(62% 0 29% 0); transform: skew(0.3deg); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(25% 0 58% 0); transform: skew(-0.3deg); }
            20% { clip-path: inset(12% 0 85% 0); transform: skew(0.5deg); }
            40% { clip-path: inset(85% 0 2% 0); transform: skew(-0.5deg); }
            60% { clip-path: inset(3% 0 92% 0); transform: skew(0.2deg); }
            80% { clip-path: inset(95% 0 1% 0); transform: skew(-0.1deg); }
            100% { clip-path: inset(50% 0 45% 0); transform: skew(-0.3deg); }
        }

        /* Entry Animation */
        .fade-in-scale { 
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
            transform: scale(0.96) translateY(15px); 
        }
        @keyframes fadeInScale { 
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            } 
        }
    </style>
</head>

<body class="bg-[#F8FAFC] font-sans text-slate-900 antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <!-- Stars space overlay -->
    <div class="stars-overlay"></div>
    
    <!-- Ambient organic glows -->
    <div class="ambient-glow-404-1"></div>
    <div class="ambient-glow-404-2"></div>

    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center p-6 relative z-10 overflow-hidden">
        <div class="max-w-2xl w-full text-center fade-in-scale relative z-20">
            
            <!-- Floating zero-gravity Logo component -->
            <div class="relative w-44 h-44 mx-auto mb-8 flex items-center justify-center float-logo">
                <!-- Orbit dashed ring -->
                <div class="absolute inset-0 rounded-full border border-dashed border-brand-orange/20 animate-spin-slow"></div>
                <!-- Radial inner pulse -->
                <div class="absolute w-24 h-24 bg-brand-orange/5 rounded-full blur-xl animate-pulse-slow"></div>
                
                <!-- Zero-Gravity Logo Container -->
                <div class="relative w-24 h-24 bg-white rounded-3xl flex flex-col items-center justify-center shadow-[0_15px_45px_rgba(240,90,40,0.12)] border border-slate-100 transform hover:scale-105 transition-transform duration-300 p-4 z-10">
                    <img src="/img/icons/icon-192x192.webp" alt="MiSmartech Logo" class="w-full h-full object-contain">
                </div>
            </div>

            <!-- Glitch Error Header -->
            <div class="mb-4 relative inline-block">
                <h1 class="text-8xl md:text-[11rem] font-black leading-none glitch-text tracking-tighter" data-text="404">
                    404
                </h1>
            </div>

            <!-- Futuristic Message -->
            <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter mb-4 text-slate-900 leading-tight">
                ¡Ups! Error en la <span class="bg-gradient-to-r from-brand-orange to-orange-500 bg-clip-text text-transparent">Matrix</span>
            </h2>
            
            <p class="text-slate-500 font-medium text-sm md:text-base max-w-md mx-auto mb-10 leading-relaxed">
                La página que buscas no existe, fue movida o quizás nunca estuvo aquí. No te preocupes, en MiSmartech siempre hay un camino de regreso.
            </p>

            <!-- Cyberpunk Styled Action Buttons (Light Theme) -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center max-w-sm mx-auto sm:max-w-none">
                <a href="/index.html" class="w-full sm:w-auto bg-gradient-to-r from-brand-orange to-brand-red text-white px-8 py-4.5 rounded-2xl font-black text-xs uppercase tracking-[0.15em] shadow-[0_8px_25px_rgba(240,90,40,0.18)] hover:shadow-[0_15px_35px_rgba(240,90,40,0.35)] hover:-translate-y-0.5 active:scale-95 transform transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-house text-[10px]"></i> Ir al Inicio
                </a>
                
                <a href="/shop/catalog.html" class="w-full sm:w-auto bg-white text-slate-800 border border-slate-200 shadow-sm px-8 py-4.5 rounded-2xl font-black text-xs uppercase tracking-[0.15em] hover:bg-slate-50 hover:border-brand-orange/45 hover:-translate-y-0.5 active:scale-95 transform transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-store text-[10px]"></i> Ver Catálogo
                </a>
            </div>

            <!-- Report Block -->
            <div class="mt-14 pt-8 border-t border-dashed border-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.25em] mb-3">¿Crees que es un error del sistema?</p>
                <a href="https://wa.me/573015380202" target="_blank" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-green-500/[0.04] border border-green-500/10 hover:bg-green-500/[0.08] hover:border-green-500/20 text-xs font-black text-slate-700 hover:text-green-600 transition duration-300">
                    <i class="fa-brands fa-whatsapp text-sm text-green-500"></i> Reportar a Soporte
                </a>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        // Import dinámico con manejo de errores por si la ruta relativa falla
        try {
            const { loadGlobalHeader, loadGlobalFooter } = await import('/js/global-components.js');
            loadGlobalHeader();
            loadGlobalFooter();
        } catch (e) {
            console.warn("No se pudieron cargar los componentes globales en 404 (ruta o script no encontrado).", e);
        }
    </script>
</body>
</html>
