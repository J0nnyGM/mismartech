<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F05A28">
    <link class="apple-touch-icon" rel="apple-touch-icon" href="/img/icons/icon-192x192.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas | Smartech</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="canonical" href="https://mismartech.com/brands.html" />
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        /* Animación suave de entrada */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Resplandor ambiental de marca en el fondo del sitio */
        .bg-glow {
            background: radial-gradient(circle at 50% 50%, rgba(240, 90, 40, 0.04) 0%, transparent 75%);
        }

        /* Hace que el header se desplace con la página en vez de quedarse fijo (sticky) */
        header {
            position: relative !important;
            top: auto !important;
            box-shadow: none !important;
        }
        
        /* Desplaza también el buscador/banner móvil en caso de que esté sticky */
        .lg\:hidden.sticky {
            position: relative !important;
            top: auto !important;
            box-shadow: none !important;
        }
    </style>
    <link rel="modulepreload" href="js/firebase-init.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js">
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js">
</head>

<body class="bg-slate-50/60 font-sans text-brand-black antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <!-- Decoración de iluminación ambiental de fondo -->
    <div class="absolute top-20 left-1/4 w-[600px] h-[600px] bg-glow pointer-events-none -z-10"></div>

    <div id="header-placeholder"></div>

    <!-- Contenedor adaptado a todo el ancho (fluid full width px-4 md:px-12 sin max-w-7xl) -->
    <main class="flex-grow w-full px-4 md:px-12 py-16 relative z-10">
        
        <div id="main-view" class="fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6 border-l-[6px] border-brand-orange pl-6 md:pl-8 rounded-l">
                <div>
                    <h2 class="text-4xl md:text-5xl font-black text-brand-black tracking-tighter uppercase leading-none">Nuestras <span class="text-brand-orange">Marcas</span></h2>
                    <p class="text-gray-400 font-black text-[10px] mt-2.5 uppercase tracking-[0.2em] leading-none">Tecnología de los mejores fabricantes</p>
                </div>
                <a href="/shop/catalog.html" class="group flex items-center gap-3 bg-brand-black text-white px-7 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-brand-orange hover:text-brand-black transition duration-300 shadow-md hover:shadow-[0_10px_25px_-5px_rgba(240, 90, 40,0.35)] hover:-translate-y-0.5 shrink-0">
                    <span>Ver Todo el Catálogo</span>
                    <i class="fa-solid fa-store group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>

            <!-- Grilla Principal que contendrá dinámicamente las tarjetas de marca -->
            <div id="brands-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 items-start">
                <div class="col-span-full flex justify-center py-24">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-orange"></i>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadGlobalHeader, loadGlobalFooter } from './js/global-components.js';
        loadGlobalHeader();
        loadGlobalFooter();
    </script>
    <script type="module" src="js/shop/brands.js"></script>

</body>
</html>
